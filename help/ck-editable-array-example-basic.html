<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ck-editable-array – Basic Example</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7fafc;
      color: #1a202c;
    }
    h1 { margin: 0 0 0.25rem; }
    p { margin: 0.25rem 0 0.75rem; max-width: 680px; font-size: 0.95rem; }
    ck-editable-array {
      display: block;
      max-width: 520px;
      margin: 1rem 0 1.5rem;
      padding: 16px;
      background: #ffffff;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
    }
    .row-display, .row-edit {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      margin-bottom: 6px;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
    }
    .row-edit {
      border: 2px solid #3b82f6;
      background: #ffffff;
    }
    .value-pill {
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    input[data-bind] {
      flex: 1;
      padding: 6px 8px;
      border-radius: 4px;
      border: 1px solid #cbd5e0;
      font-size: 0.9rem;
    }
    button {
      font-size: 0.8rem;
      padding: 6px 10px;
      border-radius: 4px;
      border: 1px solid #cbd5e0;
      background: #edf2f7;
      cursor: pointer;
    }
    button[data-action="toggle"] { background: #3b82f6; color: #f9fafb; border-color: #2563eb; }
    button[data-action="save"]   { background: #10b981; color: #f9fafb; border-color: #059669; }
    button[data-action="cancel"] { background: #6b7280; color: #f9fafb; border-color: #4b5563; }
    button[data-action="delete"] { background: #fee2e2; color: #b91c1c; border-color: #fecaca; }
    button[data-action="restore"]{ background: #ecfdf3; color: #15803d; border-color: #bbf7d0; }
    pre#log {
      max-width: 520px;
      padding: 10px 12px;
      border-radius: 6px;
      background: #111827;
      color: #e5e7eb;
      font-size: 0.8rem;
      overflow: auto;
    }
  </style>
</head>
<body>
  <h1>ck-editable-array – Basic Example</h1>
  <p>
    A minimal configuration where each row is a single string. Try editing values, deleting, restoring,
    and adding new letters to see <code>datachanged</code> events.
  </p>

  <ck-editable-array id="letters" name="letters">
    <template slot="display">
      <div class="row-display">
        <span class="value-pill" data-bind="value"></span>
        <div>
          <button type="button" data-action="toggle">Edit</button>
          <button type="button" data-action="delete">Delete</button>
          <button type="button" data-action="restore">Restore</button>
        </div>
      </div>
    </template>

    <template slot="edit">
      <div class="row-edit">
        <input data-bind="value" aria-label="Letter value">
        <button type="button" data-action="save">Save</button>
        <button type="button" data-action="cancel">Cancel</button>
      </div>
    </template>
  </ck-editable-array>

  <pre id="log" aria-live="polite">Waiting for datachanged events...</pre>

  <script type="module">
    import '../dist/ck-editable-array/ck-editable-array.esm.js';

    const el = document.getElementById('letters');
    const log = document.getElementById('log');

    el.data = ['A', 'B', 'C'];
    el.newItemFactory = () => '';

    el.addEventListener('datachanged', (event) => {
      log.textContent = 'datachanged: ' + JSON.stringify(event.detail.data, null, 2);
    });
  </script>
</body>
</html>
